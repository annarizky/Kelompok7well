<!-- BAGIAN CONTACT & LOCATION -->
<section class="w-full bg-[#FAFFCB] py-20">
  <div class="container mx-auto px-10 md:px-20">
    <!-- Judul Utama -->
    <div class="text-center mb-16">
      <h2 class="text-5xl font-serif font-bold text-gray-800">Contact <span class="text-[#F13E93]">Us</span></h2>
      <p class="text-gray-600 mt-4 text-lg">Have questions or want to place a custom order? We'd love to hear from you!</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
      <!-- SISI KIRI: Form Kirim Pesan (Card Putih) -->
      <div class="bg-white p-8 rounded-3xl shadow-lg">
        <h3 class="text-2xl font-bold mb-6 text-gray-800">Send us a Message</h3>
        <form class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Your Name</label>
            <input type="text" placeholder="John Doe" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#F13E93]/20">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
            <input type="email" placeholder="john@example.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#F13E93]/20">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Message</label>
            <textarea rows="4" placeholder="Tell us about your cake dreams..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#F13E93]/20"></textarea>
          </div>
          <button class="w-full bg-[#F13E93] text-white font-bold py-3 rounded-xl hover:bg-[#d63381] transition-all">
            Send Message
          </button>
        </form>
      </div>

      <!-- SISI KANAN: Info Kontak & Lokasi -->
      <div class="space-y-6">
        <!-- Baris Info (Grid 2 kolom) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <!-- WhatsApp -->
          <div class="bg-white p-6 rounded-2xl shadow-md flex items-center gap-4">
            <div class="bg-[#FFCEE3] p-3 rounded-full text-[#F13E93]">
              <i data-lucide="phone"></i>
            </div>
            <div>
              <p class="text-xs text-gray-500 font-bold uppercase">WhatsApp</p>
              <p class="font-bold text-gray-800">085-674-9873</p>
            </div>
          </div>
          <!-- Jam Operasi -->
          <div class="bg-white p-6 rounded-2xl shadow-md flex items-center gap-4">
            <div class="bg-[#FFCEE3] p-3 rounded-full text-[#F13E93]">
              <i data-lucide="clock"></i>
            </div>
            <div>
              <p class="text-xs text-gray-500 font-bold uppercase">Hours</p>
              <p class="font-bold text-gray-800">Mon-Sat: 8AM-8PM</p>
            </div>
          </div>
        </div>

        <!-- Alamat/Lokasi -->
        <div class="bg-white p-6 rounded-2xl shadow-md flex items-center gap-4">
          <div class="bg-[#FFCEE3] p-3 rounded-full text-[#F13E93]">
            <i data-lucide="map-pin"></i>
          </div>
          <div class="flex-1">
            <p class="text-xs text-gray-500 font-bold uppercase">Address</p>
            <p class="font-bold text-gray-800">123 Sweet Street, Bakery District</p>
          </div>
        </div>

        <!-- Placeholder Map (Seperti di Figma) -->
        <div class="w-full h-48 bg-gray-200 rounded-3xl overflow-hidden relative border-4 border-white shadow-lg">
            <!-- Ganti src ini dengan embed Google Maps jika perlu -->
            <div class="absolute inset-0 flex items-center justify-center bg-gray-100 italic text-gray-400">
                [ Google Maps Area ]
            </div>
            <div class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white px-6 py-2 rounded-full shadow-md">
                <span class="text-[#F13E93] font-bold">Visit Our Store</span>
            </div>
        </div>
      </div>
    </div>
  </div>
</section>

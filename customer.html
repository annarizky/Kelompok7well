<style>
    testimonial-container {
        /* Mengganti ke warna kuning pastel sesuai foto */
        background-color: #f7f9e8; 
        padding: 60px 20px;
        text-align: center;
        font-family: Arial, sans-serif;
    }

    testimonial-header {
        margin-bottom: 40px;
    }

    testimonial-header span {
        color: #d81b60; /* Warna pink fuchsia untuk label kecil */
        font-size: 14px;
        font-weight: bold;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    testimonial-header h2 {
        font-size: 36px;
        color: #333;
        margin-top: 10px;
    }

    testimonial-header h2 span {
        color: #d81b60; /* Warna pink fuchsia untuk kata 'Customers' */
        font-size: inherit;
        text-transform: none;
        letter-spacing: normal;
    }

    testimonial-card {
        background: white;
        max-width: 700px;
        margin: 0 auto;
        padding: 40px;
        border-radius: 20px;
        position: relative;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* Bayangan halus */
        text-align: left;
    }

    /* Ikon kutipan pink bulat seperti di desain Figma */
    quote-badge {
        position: absolute;
        top: -20px;
        left: 40px;
        background: #d81b60;
        color: white;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        font-weight: bold;
    }

    stars-rating {
        color: #d81b60;
        font-size: 20px;
        margin-bottom: 15px;
    }

    testimonial-quote {
        font-size: 18px;
        line-height: 1.6;
        color: #444;
        margin-bottom: 25px;
        font-style: italic;
    }

    customer-detail {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    customer-avatar {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: #fce4ec;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #d81b60;
        font-weight: bold;
    }

    customer-info h4 {
        margin: 0;
        color: #333;
        font-size: 16px;
    }
</style>

<section class="testimonial-container">
    <div class="testimonial-header">
        <span>Testimonials</span>
        <h2>What Our <span>Customers</span> Say</h2>
    </div>

    <div class="testimonial-card">
        <div class="quote-badge">“</div>
        <div class="stars-rating">★★★★★</div>
        <p class="testimonial-quote">
            "GLAZYLICIOUS made our wedding day absolutely magical! The three-tier cake was not only stunning but tasted incredible. Every guest couldn't stop talking about it!"
        </p>
        <div class="customer-detail">
            <div class="customer-avatar">S</div>
            <div class="customer-info">
                <h4>Sabrina Carpenter</h4>
            </div>
        </div>
    </div>
</section>
